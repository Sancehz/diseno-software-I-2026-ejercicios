service: moto-parts-marketplace

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  environment:
    DYNAMODB_ENDPOINT: http://localhost:8000
    TABLE_NAME: MotoPartes
    AWS_ACCESS_KEY_ID: local
    AWS_SECRET_ACCESS_KEY: local

plugins:
  - serverless-offline
  - serverless-dynamodb-local

custom:
  serverless-offline:
    httpPort: 3000
    noPrependStageInUrl: true
  dynamodb:
    stages:
      - dev
    start:
      port: 8000
      inMemory: true
      migrate: true
      seed: true
    seed:
      dev:
        sources:
          - table: MotoPartes
            sources: [./seed/partes.json]

functions:
  crearParte:
    handler: src/handlers/crearParte.handler
    events:
      - http:
          path: /partes
          method: post
          cors: true

  listarPartes:
    handler: src/handlers/listarPartes.handler
    events:
      - http:
          path: /partes
          method: get
          cors: true

resources:
  Resources:
    MotoPartesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: MotoPartes
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: tipo
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: tipo-index
            KeySchema:
              - AttributeName: tipo
                KeyType: HASH
            Projection:
              ProjectionType: ALL
            ProvisionedThroughput:
              ReadCapacityUnits: 5
              WriteCapacityUnits: 5
        ProvisionedThroughput:
          ReadCapacityUnits: 5
          WriteCapacityUnits: 5
